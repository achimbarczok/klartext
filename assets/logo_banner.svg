<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E07A3C"/>
      <stop offset="100%" stop-color="#B7401F"/>
    </linearGradient>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F1B17"/>
      <stop offset="100%" stop-color="#15120F"/>
    </linearGradient>
  </defs>

  <!-- Banner-Hintergrund -->
  <rect width="1280" height="320" fill="url(#pageBg)"/>

  <!-- Icon-Plakette links -->
  <g transform="translate(80, 64)">
    <rect x="0" y="0" width="192" height="192" rx="40" ry="40" fill="url(#bg)"/>
    <rect x="0" y="0" width="192" height="192" rx="40" ry="40" fill="none"
          stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>

    <!-- Wellenform skaliert auf 192er Icon (Skalierung 192/512 = 0.375) -->
    <g transform="translate(0,0) scale(0.375)" fill="#FFFFFF">
      <rect x="100" y="236" width="22" height="40"  rx="11"/>
      <rect x="138" y="200" width="22" height="112" rx="11"/>
      <rect x="176" y="170" width="22" height="172" rx="11"/>
      <rect x="214" y="216" width="22" height="80"  rx="11"/>
    </g>
    <g transform="translate(0,0) scale(0.375)"
       stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"
       stroke-linejoin="round" fill="none">
      <line x1="258" y1="256" x2="298" y2="256"/>
      <polyline points="284,238 302,256 284,274"/>
    </g>
    <g transform="translate(0,0) scale(0.375)" fill="#FFFFFF">
      <rect x="322" y="186" width="110" height="20" rx="10"/>
      <rect x="322" y="218" width="86"  height="20" rx="10"/>
      <rect x="322" y="250" width="120" height="20" rx="10"/>
      <rect x="322" y="282" width="74"  height="20" rx="10"/>
      <rect x="322" y="314" width="98"  height="20" rx="10"/>
    </g>
  </g>

  <!-- Wortmarke + Untertitel -->
  <g transform="translate(320, 0)">
    <text x="0" y="170"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="120" font-weight="800" fill="#F5EFE7"
          letter-spacing="-3">Klartext</text>
    <text x="6" y="220"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="32" font-weight="500" fill="#E07A3C"
          letter-spacing="2">SPEECH&#160;&#160;→&#160;&#160;TEXT&#160;&#160;·&#160;&#160;LLM&#160;&#160;TRANSCRIPTION</text>
    <text x="6" y="262"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="26" font-weight="400" fill="#9A9089"
          letter-spacing="0">Eine schlanke Transkriptions-App, geschrieben in Rust.</text>
  </g>

  <!-- Rust-Hinweis: dezentes Zahnrad oben rechts -->
  <g transform="translate(1180, 50)" fill="none" stroke="#E07A3C"
     stroke-width="3" stroke-opacity="0.55">
    <circle cx="0" cy="0" r="28"/>
    <circle cx="0" cy="0" r="10"/>
    <g stroke-linecap="round">
      <line x1="0" y1="-40" x2="0" y2="-32"/>
      <line x1="0" y1="32"  x2="0" y2="40"/>
      <line x1="-40" y1="0" x2="-32" y2="0"/>
      <line x1="32" y1="0"  x2="40" y2="0"/>
      <line x1="-28" y1="-28" x2="-22" y2="-22"/>
      <line x1="22" y1="22"   x2="28" y2="28"/>
      <line x1="-28" y1="28"  x2="-22" y2="22"/>
      <line x1="22" y1="-22"  x2="28" y2="-28"/>
    </g>
  </g>
</svg>
